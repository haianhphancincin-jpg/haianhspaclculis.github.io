<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Tập Trọng Âm Tiếng Anh</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --accent3: #43e97b;
    --accent4: #f9ca24;
    --text: #e8e8f0;
    --text-muted: #8888aa;
    --correct: #43e97b;
    --wrong: #ff5370;
    --border: rgba(108,99,255,0.2);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,157,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; position: relative; z-index: 1; }

  /* HEADER */
  header { text-align: center; margin-bottom: 36px; }
  header h1 {
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, #6c63ff, #ff6b9d);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  header p { color: var(--text-muted); font-size: 0.95rem; }

  /* SET SELECTOR */
  .set-selector { margin-bottom: 32px; }
  .set-selector h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 12px; text-align: center; }
  .set-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .set-btn {
    background: var(--surface); border: 2px solid var(--border);
    color: var(--text); padding: 10px 22px; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
    cursor: pointer; transition: all 0.2s;
  }
  .set-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .set-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,0.4); }

  /* PROGRESS */
  .progress-bar-wrap { background: var(--surface); border-radius: 50px; height: 8px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 50px; transition: width 0.4s ease; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 24px; }
  .score-badge {
    display: inline-flex; gap: 16px; background: var(--surface); border-radius: 50px;
    padding: 4px 16px; font-size: 0.82rem;
  }
  .score-correct { color: var(--correct); font-weight: 700; }
  .score-wrong { color: var(--wrong); font-weight: 700; }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; margin-bottom: 20px;
    box-shadow: var(--shadow); animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .q-number { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .q-text { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 20px; line-height: 1.5; }

  /* OPTIONS */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 520px) { .options { grid-template-columns: 1fr; } }

  .option-btn {
    background: var(--surface2); border: 2px solid transparent;
    border-radius: 14px; padding: 14px 18px; text-align: left;
    cursor: pointer; transition: all 0.18s; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.92rem; font-weight: 600;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,99,255,0.1); transform: translateY(-1px); }
  .option-btn:disabled { cursor: not-allowed; }
  .option-label {
    font-family: 'Space Mono', monospace; font-size: 0.78rem;
    background: var(--accent); color: #fff; border-radius: 6px;
    padding: 2px 7px; flex-shrink: 0; margin-top: 1px;
  }
  .option-word { font-weight: 800; font-size: 1rem; }
  .option-btn.correct { background: rgba(67,233,123,0.12); border-color: var(--correct); }
  .option-btn.correct .option-label { background: var(--correct); color: #111; }
  .option-btn.wrong { background: rgba(255,83,112,0.12); border-color: var(--wrong); }
  .option-btn.wrong .option-label { background: var(--wrong); }
  .option-btn.reveal { background: rgba(67,233,123,0.08); border-color: rgba(67,233,123,0.4); }

  /* EXPLANATION */
  .explanation {
    margin-top: 18px; padding: 18px 20px;
    background: rgba(108,99,255,0.08); border-left: 4px solid var(--accent);
    border-radius: 12px; animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .explanation h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 10px; }
  .phonetics { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .phonetic-item {
    background: var(--surface2); border-radius: 8px; padding: 6px 12px;
    font-size: 0.85rem; border: 1px solid var(--border);
  }
  .phonetic-item .ph-label { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--text-muted); display: block; }
  .phonetic-item .ph-word { font-weight: 700; color: var(--text); }
  .phonetic-item .ph-ipa { font-style: italic; color: var(--accent2); font-size: 0.82rem; }
  .phonetic-item .ph-stress { font-size: 0.72rem; color: var(--text-muted); }
  .phonetic-item.is-answer { border-color: var(--accent2); background: rgba(255,107,157,0.08); }
  .explanation-text { font-size: 0.88rem; color: var(--text-muted); line-height: 1.7; }
  .explanation-text strong { color: var(--text); }
  .answer-tag {
    display: inline-block; background: var(--accent2); color: #fff;
    padding: 1px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700;
    margin-left: 4px; vertical-align: middle;
  }

  /* NEXT BUTTON */
  .next-btn {
    display: block; width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
    cursor: pointer; margin-top: 16px; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
    display: none;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(108,99,255,0.5); }
  .next-btn.visible { display: block; }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center; padding: 48px 24px;
    background: var(--surface); border-radius: 24px;
    border: 1px solid var(--border); display: none;
  }
  .result-screen.visible { display: block; animation: slideIn 0.4s ease; }
  .result-emoji { font-size: 4rem; margin-bottom: 16px; }
  .result-screen h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
  .result-score { font-size: 3rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent3), var(--accent4));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 16px 0; }
  .result-screen p { color: var(--text-muted); margin-bottom: 24px; }
  .restart-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 12px 32px; border-radius: 50px; font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4); transition: all 0.2s;
  }
  .restart-btn:hover { transform: translateY(-2px); }

  .no-questions { text-align: center; color: var(--text-muted); padding: 48px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎯 Luyện Tập Trọng Âm</h1>
    <p>Chọn từ có trọng âm khác với các từ còn lại</p>
  </header>

  <div class="set-selector">
    <h2>Chọn Set</h2>
    <div class="set-buttons" id="setButtons"></div>
  </div>

  <div id="quizArea">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-info">
      <span id="progressText">Câu 1 / 20</span>
      <span class="score-badge">
        <span class="score-correct" id="scoreCorrect">✓ 0</span>
        <span class="score-wrong" id="scoreWrong">✗ 0</span>
      </span>
    </div>
    <div id="questionContainer"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji"></div>
    <h2 id="resultTitle"></h2>
    <div class="result-score" id="resultScore"></div>
    <p id="resultMsg"></p>
    <button class="restart-btn" onclick="restartSet()">Làm lại set này</button>
  </div>
</div>

<script>

// ===========================================================
// APP STATE
// ===========================================================
let currentSet = 1;
let currentIdx = 0;
let answered = false;
let correctCount = 0;
let wrongCount = 0;
let shuffledQuestions = [];

const labels = ['A','B','C','D'];

function shuffleArray(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function initSet(setNum) {
  currentSet = setNum;
  currentIdx = 0;
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  shuffledQuestions = [...questions[setNum]];

  document.querySelectorAll('.set-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.set) === setNum);
  });
  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('quizArea').style.display = '';
  updateScoreUI();
  renderQuestion();
}

function updateScoreUI() {
  document.getElementById('scoreCorrect').textContent = '✓ ' + correctCount;
  document.getElementById('scoreWrong').textContent = '✗ ' + wrongCount;
  const total = shuffledQuestions.length;
  const pct = total > 0 ? (currentIdx / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Câu ${Math.min(currentIdx+1, total)} / ${total}`;
}

function renderQuestion() {
  const total = shuffledQuestions.length;
  if (currentIdx >= total) { showResult(); return; }

  answered = false;
  const q = shuffledQuestions[currentIdx];
  updateScoreUI();

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.remove('visible');

  const container = document.getElementById('questionContainer');
  container.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'question-card';

  card.innerHTML = `
    <div class="q-number">Câu ${currentIdx + 1} / ${total}</div>
    <div class="q-text">Chọn từ có trọng âm <strong>khác</strong> với các từ còn lại:</div>
    <div class="options" id="optionsGrid"></div>
    <div class="explanation" id="explanation" style="display:none"></div>
  `;
  container.appendChild(card);

  const grid = card.querySelector('#optionsGrid');
  q.opts.forEach((word, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><div><span class="option-word">${word}</span></div>`;
    btn.onclick = () => handleAnswer(i, q, card);
    grid.appendChild(btn);
  });
}

function handleAnswer(chosen, q, card) {
  if (answered) return;
  answered = true;

  const buttons = card.querySelectorAll('.option-btn');
  const isCorrect = chosen === q.answer;

  if (isCorrect) correctCount++;
  else wrongCount++;

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  });

  // Show explanation
  const expDiv = card.querySelector('#explanation');
  expDiv.style.display = 'block';

  let phoneticsHTML = q.opts.map((word, i) => `
    <div class="phonetic-item${i===q.answer?' is-answer':''}">
      <span class="ph-label">${labels[i]}${i===q.answer?' ★':''}</span>
      <span class="ph-word">${word}</span>
      <span class="ph-ipa">${q.phonetics[i]}</span>
      <span class="ph-stress">Âm ${q.stress[i]}</span>
    </div>
  `).join('');

  expDiv.innerHTML = `
    <h4>📖 Phiên âm & Trọng âm</h4>
    <div class="phonetics">${phoneticsHTML}</div>
    <div class="explanation-text">
      ${isCorrect ? '✅ <strong>Chính xác!</strong>' : '❌ <strong>Chưa đúng.</strong>'}
      <span class="answer-tag">Đáp án: ${labels[q.answer]}</span><br>
      ${q.explain}
    </div>
  `;

  document.getElementById('scoreCorrect').textContent = '✓ ' + correctCount;
  document.getElementById('scoreWrong').textContent = '✗ ' + wrongCount;
  document.getElementById('nextBtn').classList.add('visible');
  
  // Update progress
  const total = shuffledQuestions.length;
  const pct = ((currentIdx + 1) / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function nextQuestion() {
  currentIdx++;
  renderQuestion();
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const total = shuffledQuestions.length;
  const pct = Math.round((correctCount / total) * 100);
  let emoji, title, msg;
  if (pct === 100) { emoji='🏆'; title='Xuất sắc!'; msg='Bạn trả lời đúng tất cả! Thật tuyệt vời!'; }
  else if (pct >= 80) { emoji='🌟'; title='Rất giỏi!'; msg='Kết quả rất tốt. Tiếp tục luyện tập nhé!'; }
  else if (pct >= 60) { emoji='👍'; title='Khá tốt!'; msg='Bạn đang tiến bộ. Ôn lại những câu sai nhé!'; }
  else { emoji='💪'; title='Cố lên!'; msg='Hãy ôn lại lý thuyết trọng âm và thử lại!'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `${correctCount} / ${total}`;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultScreen').classList.add('visible');
}

function restartSet() {
  initSet(currentSet);
}

// Build set buttons
window.onload = () => {
  const container = document.getElementById('setButtons');
  [1,2,3,4,5].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'set-btn';
    btn.dataset.set = n;
    btn.textContent = `Set ${n}`;
    btn.onclick = () => initSet(n);
    container.appendChild(btn);
  });
  initSet(1);
};
</script>
